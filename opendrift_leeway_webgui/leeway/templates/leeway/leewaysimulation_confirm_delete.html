{% extends "base.html" %}
{% block content %}
    <h2>Delete Leeway Simulation {{ object.name|default:object.uuid }}</h2>
    <p>Are you sure you want to delete this simulation? This action cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Delete</button>
        <a href="{% url "simulation_list" %}">Cancel</a>
    </form>
{% endblock content %}
